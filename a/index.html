    <script>
        // تأثير تموج عند الضغط
        document.querySelectorAll('.social-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}px;
                    top: ${y}px;
                    background: rgba(255,255,255,0.6);
                    border-radius: 50%;
                    transform: scale(0);
                    animation: ripple 0.6s linear;
                    pointer-events: none;
                `;
                
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });

        // إضافة رسالة ترحيب

            setTimeout(() => {

            }, 2000);
        }, 500);
    </script>

    <style>

        body {

<body>
    <!-- المستطيل الرئيسي -->
    <div class="live-stats-card">
        <!-- مؤشر البث المباشر -->
        <div class="live-indicator"></div>
        
        <!-- العنوان -->
        <h2 class="stats-title">
            <i class="fas fa-broadcast-tower"></i>
            إحصائيات البث المباشر
        </h2>

        <!-- الإحصائيات الرئيسية -->
        <div class="stats-container">
            <!-- عدد المشاهدين -->
            <div class="stat-item">
                <i class="fas fa-eye stat-icon"></i>
                <span class="stat-number" id="viewers">80</span>
                <div class="stat-label">مشاهد الآن</div>
            </div>

            <!-- عدد المتابعين -->
            <div class="stat-item">
                <i class="fas fa-users stat-icon"></i>
                <span class="stat-number" id="followers">517</span>
                <div class="stat-label">المتابعين</div>
            </div>
        </div>

        <!-- شرائط التقدم -->
        <div class="progress-section">
            <div class="progress-item">
                <span class="progress-label">التفاعل :</span>
                <div class="progress-bar">
                    <div class="progress-fill" data-percent="87%" style="width: 78%;"></div>
                </div>
            </div>
            <div class="progress-item">
                <span class="progress-label">الإعجابات:</span>
                <div class="progress-bar">
                    <div class="progress-fill" data-percent="23%" style="width: 23%;"></div>
                </div>
            </div>
        </div>

        <!-- زر التحديث -->
        <button class="refresh-btn" onclick="updateStats()">
            <i class="fas fa-sync-alt"></i> تحديث
        </button>
    </div>

    <script>
        // تحديث تلقائي كل 10 ثواني
        setInterval(updateStats, 10000);

        // دالة تحديث الإحصائيات
        function updateStats() {
            // تحديث المشاهدين (+/- عشوائي)
            const viewers = document.getElementById('viewers');
            const currentViewers = parseInt(viewers.textContent.replace(/,/g, ''));
            const change = Math.floor(Math.random() * 200) - 100;
            const newViewers = Math.max(0, currentViewers + change);
            viewers.textContent = newViewers.toLocaleString();

            // تحديث المتابعين (يزيد فقط)
            const followers = document.getElementById('followers');
            const currentFollowers = parseInt(followers.textContent.replace(/,/g, ''));
            if (Math.random() > 0.7) {
                const newFollowers = currentFollowers + Math.floor(Math.random() * 50) + 10;
                followers.textContent = newFollowers.toLocaleString();
            }

            // تأثير الاهتزاز
            viewers.style.animation = 'none';
            followers.style.animation = 'none';
            setTimeout(() => {
                viewers.style.animation = 'countUp 0.5s ease-out';
                followers.style.animation = 'countUp 0.5s ease-out';
            }, 100);
        }

        // تأثير التمرير
        window.addEventListener('scroll', () => {
            document.querySelector('.live-stats-card').style.transform = 
                `translateY(${window.scrollY * 0.1}px)`;
        });
    </script>




 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأثير ماوس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(45deg, #dad0d0, #150d7c, #08073a48, #0d1a96);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            cursor: none;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cursor مخصص */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.3s ease;
        }

        .hover {
            transform: scale(2) !important;
        }

        .click {
            background: rgba(255, 107, 107, 0.8) !important;
            transform: scale(1.5);
        }

        /* عناصر تفاعلية */
        .card {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: none;
        }

        .card:hover {
            transform: translateY(-20px) scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        .card:nth-child(1) { top: 20%; left: 20%; }
        .card:nth-child(2) { top: 40%; right: 20%; }
        .card:nth-child(3) { bottom: 20%; left: 20%; }
        .card:nth-child(4) { bottom: 20%; right: 20%; }

        h1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: 3rem;
            text-align: center;
            z-index: 10;
        }
    </style>

    
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <script>
        const cursor = document.getElementById('cursor');
        const cursorFollower = document.getElementById('cursorFollower');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let followerX = 0, followerY = 0;

        // تحريك الماوس
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // تحديث موقع الـ cursor
        function updateCursor() {
            cursorX += (mouseX - cursorX) * 0.2;
            cursorY += (mouseY - cursorY) * 0.2;
            followerX += (mouseX - followerX) * 0.1;
            followerY += (mouseY - followerY) * 0.1;

            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            cursorFollower.style.left = followerX + 'px';
            cursorFollower.style.top = followerY + 'px';

            requestAnimationFrame(updateCursor);
        }

        // تأثيرات Hover
        document.querySelectorAll('.card, h1').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.classList.add('hover');
                cursorFollower.classList.add('hover');
            });
            
            el.addEventListener('mouseleave', () => {
                cursor.classList.remove('hover');
                cursorFollower.classList.remove('hover');
            });
        });

        // تأثير الضغط
        document.addEventListener('mousedown', () => {
            cursor.classList.add('click');
        });

        document.addEventListener('mouseup', () => {
            cursor.classList.remove('click');
        });

        // بدء التحريك
        updateCursor();
    </script>
